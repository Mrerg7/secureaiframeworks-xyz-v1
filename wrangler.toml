name = "secureaiframeworks-xyz-v1"
main = "src/worker.ts"
compatibility_date = "2026-07-01"
workers_dev = false
preview_urls = false

[[routes]]
pattern = "secureaiframeworks.xyz"
custom_domain = true

[[routes]]
pattern = "www.secureaiframeworks.xyz"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = true
